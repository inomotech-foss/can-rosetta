# EXAMPLE ONLY — do not apply as-is and do not commit real values.
#
# On pegasus the `canrosetta-oidc` Secret is produced automatically by the
# Secrets Store CSI driver from OpenBao (see secretproviderclass.yaml), so you
# normally do NOT create it by hand. This file documents the shape the Envoy
# Gateway SecurityPolicy expects, for portability to a cluster without OpenBao.
#
# Create it out-of-band (never in git) with:
#   kubectl -n inomo-canrosetta create secret generic canrosetta-oidc \
#     --from-literal=client-secret='<Entra app client secret>'
apiVersion: v1
kind: Secret
metadata:
  name: canrosetta-oidc
  namespace: inomo-canrosetta
type: Opaque
stringData:
  # The Entra app-registration client secret. Placeholder — replace at apply time.
  client-secret: "REPLACE_ME"
