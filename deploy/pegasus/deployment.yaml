apiVersion: apps/v1
kind: Deployment
metadata:
  name: can-rosetta-server
  namespace: inomo-canrosetta
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: can-rosetta-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: can-rosetta-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: ghcr.io/inomotech-foss/can-rosetta-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: CANROSETTA_HOST
              value: "0.0.0.0"
            - name: CANROSETTA_PORT
              value: "8000"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # The API extracts uploaded sessions into a tmp dir; give it a
            # writable scratch mount so the root filesystem can stay read-only.
            - name: tmp
              mountPath: /tmp
            # OIDC client secret synced from OpenBao via the Secrets Store CSI
            # driver. The mount is what triggers the driver to materialise the
            # secret (and keep the synced k8s Secret alive) even though the app
            # itself does not read these files (Envoy Gateway does).
            - name: oidc-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: oidc-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: canrosetta-oidc
