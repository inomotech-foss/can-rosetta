# OIDC client credentials for the Entra login flow, sourced from OpenBao (the
# pegasus secrets backend) via the Secrets Store CSI driver — the same pattern
# paperplane uses. The `secretObjects` block additionally syncs the pulled
# values into a regular Kubernetes Secret named `canrosetta-oidc`, which is what
# the Envoy Gateway SecurityPolicy references for the client secret.
#
# OpenBao setup (admin, one-time) — store the Entra app-registration client
# secret at KV path kv/data/oidc/canrosetta:
#   bao kv put kv/oidc/canrosetta client_secret='<value from Entra portal>'
# and bind the CSI role `pegasus-canrosetta` to read it.
#
# Do NOT commit real secret values. Tenant ID and client ID are not secrets and
# live as placeholders in securitypolicy.yaml.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: canrosetta-oidc
  namespace: inomo-canrosetta
spec:
  provider: openbao
  parameters:
    roleName: pegasus-canrosetta
    objects: |
      - objectName: client-secret
        secretPath: kv/data/oidc/canrosetta
        secretKey: client_secret
  # Sync into a native Secret so the SecurityPolicy's clientSecret ref resolves.
  secretObjects:
    - secretName: canrosetta-oidc
      type: Opaque
      data:
        - objectName: client-secret
          key: client-secret
