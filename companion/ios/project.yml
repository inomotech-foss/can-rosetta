name: CanRosettaCompanion

options:
  bundleIdPrefix: com.inomotech.canrosetta
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # Signing is provided by Signing.xcconfig (see configFiles below), which
    # optionally includes a gitignored Signing.local.xcconfig for your team id.
    # No DEVELOPMENT_TEAM / CODE_SIGNING_* here — that would override the xcconfig.

targets:
  CanRosettaCompanion:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      # Exclude the checked-in Info.plist and entitlements; XcodeGen generates
      # them from the `info` / `entitlements` blocks below.
      - path: CanRosettaCompanion
        excludes:
          - "Info.plist"
          - "CanRosettaCompanion.entitlements"
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    # NEHotspotConfiguration (Remote/WifiJoiner.swift) needs the Hotspot
    # Configuration entitlement. It is *unmanaged* — any paid developer account
    # can sign it, no special Apple approval. Like Info.plist, the generated
    # file is checked in (keep both in sync).
    entitlements:
      path: CanRosettaCompanion/CanRosettaCompanion.entitlements
      properties:
        com.apple.developer.networking.HotspotConfiguration: true
        # Access Wi-Fi Information — required by NEHotspotNetwork.fetchCurrent
        # (TN3111), which verifies the SSID after the join. Also unmanaged.
        com.apple.developer.networking.wifi-info: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inomotech.canrosetta.companion
        PRODUCT_NAME: CanRosettaCompanion
        TARGETED_DEVICE_FAMILY: "1" # iPhone
        # Code signing lives in Signing.xcconfig (automatic). Xcode signs device
        # builds; the Simulator needs none. CI passes CODE_SIGNING_ALLOWED=NO on
        # the xcodebuild command line, which cleanly disables signing there.
    # System frameworks (CoreMotion, CoreLocation, AVFoundation,
    # NetworkExtension) are linked automatically by the Swift compiler via
    # module autolinking on `import`.
    info:
      path: CanRosettaCompanion/Info.plist
      properties:
        CFBundleDisplayName: CAN-Rosetta
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMotionUsageDescription: >-
          CAN-Rosetta records accelerometer, gyroscope and attitude while you
          drive. These motion samples are the known reference used to decode the
          vehicle's CAN bus.
        NSLocationWhenInUseUsageDescription: >-
          CAN-Rosetta records GPS position, speed and course while you drive, as
          ground-truth for aligning and decoding the vehicle's CAN bus.
        NSLocationAlwaysAndWhenInUseUsageDescription: >-
          CAN-Rosetta keeps recording GPS in the background so a drive is
          captured even when the screen is off or the phone is docked in a cradle.
        NSCameraUsageDescription: >-
          With "Film dashboard" or "Capture stills" enabled, CAN-Rosetta uses the
          rear camera to record the dashboard (video and/or periodic
          full-resolution photos) so it can later be read (OCR) as ground truth
          for signals the OBD port does not expose.
        NSLocalNetworkUsageDescription: >-
          CAN-Rosetta connects to the AutoPi over its local Wi-Fi access point to
          start investigations and coordinate recording. No data leaves the
          local network.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIBackgroundModes:
          - location
        # Keeps Wi-Fi up while the app is frontmost during a session — iOS
        # otherwise drops a no-internet AP (like the AutoPi's) on idle.
        UIRequiresPersistentWiFi: true
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true

# Explicit shared scheme so CI (`xcodebuild -scheme CanRosettaCompanion`) finds
# it without relying on Xcode auto-generating one on open.
schemes:
  CanRosettaCompanion:
    build:
      targets:
        CanRosettaCompanion: all
    run:
      config: Debug
    archive:
      config: Release
