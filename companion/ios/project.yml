name: CanRosettaCompanion

options:
  bundleIdPrefix: com.inomotech.canrosetta
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # Signing is provided by Signing.xcconfig (see configFiles below), which
    # optionally includes a gitignored Signing.local.xcconfig for your team id.
    # No DEVELOPMENT_TEAM / CODE_SIGNING_* here — that would override the xcconfig.

targets:
  CanRosettaCompanion:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      # Exclude the checked-in Info.plist and entitlements; XcodeGen generates
      # them from `info` / `entitlements` below and would otherwise sweep the
      # files into the resources phase (they sit inside the sources folder).
      - path: CanRosettaCompanion
        excludes:
          - "Info.plist"
          - "CanRosettaCompanion.entitlements"
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inomotech.canrosetta.companion
        PRODUCT_NAME: CanRosettaCompanion
        TARGETED_DEVICE_FAMILY: "1" # iPhone
        # Code signing lives in Signing.xcconfig (automatic). Xcode signs device
        # builds; the Simulator needs none. CI passes CODE_SIGNING_ALLOWED=NO on
        # the xcodebuild command line, which cleanly disables signing there.
    dependencies:
      # Embeds the widget/Live Activity extension into the app's PlugIns, so the
      # existing CI scheme (which builds only this target) builds it too — no
      # second scheme needed. The extension floors at iOS 17 while the app stays
      # at 16; on iOS 16 the app runs and the extension is simply never offered.
      - target: CanRosettaWidgets
    # App Groups is an "unmanaged capability": XcodeGen has no capabilities UI,
    # so it is declared directly via a checked-in entitlements file (generated
    # from `properties` below, like Info.plist). Automatic signing registers the
    # group; CI is unaffected because it builds with CODE_SIGNING_ALLOWED=NO.
    # The group carries the RecordingSnapshot the widget timeline reads.
    entitlements:
      path: CanRosettaCompanion/CanRosettaCompanion.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.inomotech.canrosetta.companion
    # System frameworks (CoreMotion, CoreLocation, AVFoundation) are linked
    # automatically by the Swift compiler via module autolinking on `import`.
    info:
      path: CanRosettaCompanion/Info.plist
      properties:
        CFBundleDisplayName: CAN-Rosetta
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMotionUsageDescription: >-
          CAN-Rosetta records accelerometer, gyroscope and attitude while you
          drive. These motion samples are the known reference used to decode the
          vehicle's CAN bus.
        NSLocationWhenInUseUsageDescription: >-
          CAN-Rosetta records GPS position, speed and course while you drive, as
          ground-truth for aligning and decoding the vehicle's CAN bus.
        NSLocationAlwaysAndWhenInUseUsageDescription: >-
          CAN-Rosetta keeps recording GPS in the background so a drive is
          captured even when the screen is off or the phone is docked in a cradle.
        NSCameraUsageDescription: >-
          With "Film dashboard" or "Capture stills" enabled, CAN-Rosetta uses the
          rear camera to record the dashboard (video and/or periodic
          full-resolution photos) so it can later be read (OCR) as ground truth
          for signals the OBD port does not expose.
        NSLocalNetworkUsageDescription: >-
          CAN-Rosetta connects to the AutoPi over its local Wi-Fi access point to
          start investigations and coordinate recording. No data leaves the
          local network.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIBackgroundModes:
          - location
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        # Live Activity of the running recording. iOS 26 surfaces Live
        # Activities (and widgets) on the CarPlay Dashboard with no CarPlay
        # entitlement — the zero-approval way to get recording status and a
        # Stop button onto the head unit while the phone is docked.
        NSSupportsLiveActivities: true
        # Custom URL scheme so the idle status widget's `canrosetta://record`
        # deep link (RecordingStatusWidget) routes to this app, where onOpenURL
        # navigates to the start of the drive flow. Mirrored into the checked-in
        # Info.plist (kept in sync with this block, like NSSupportsLiveActivities).
        CFBundleURLTypes:
          - CFBundleURLName: com.inomotech.canrosetta.companion
            CFBundleURLSchemes: [canrosetta]

  # Widget + Live Activity extension. iOS 26 shows an app's widgets and Live
  # Activities on the CarPlay Dashboard without any CarPlay entitlement, so this
  # target is the companion's driver-visible surface in the car. Floors at
  # iOS 17.0: interactive widgets (Button(intent:)) need 17, and Live Activity
  # UI ships in the same extension.
  CanRosettaWidgets:
    type: app-extension # extension point: com.apple.widgetkit-extension (see `info`)
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # Same convention as the app: Info.plist / entitlements are generated
      # from the blocks below, so keep the checked-in files out of the build.
      - path: CanRosettaWidgets
        excludes:
          - "Info.plist"
          - "CanRosettaWidgets.entitlements"
      # Types shared with the app (snapshot, ActivityAttributes, App Intents):
      # compiled into BOTH targets rather than pulled into a framework — the
      # widget needs the types, the app performs the intents.
      - path: CanRosettaCompanion/Shared
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inomotech.canrosetta.companion.widgets
        PRODUCT_NAME: CanRosettaWidgets
        TARGETED_DEVICE_FAMILY: "1" # iPhone
        # Extensions ship inside the app; never stage the .appex as its own
        # product in an archive (matches Xcode's extension template).
        SKIP_INSTALL: YES
    info:
      path: CanRosettaWidgets/Info.plist
      properties:
        CFBundleDisplayName: CAN-Rosetta
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    # Same App Group as the app (unmanaged capability, see the app target):
    # the widget timeline reads the RecordingSnapshot the app publishes.
    entitlements:
      path: CanRosettaWidgets/CanRosettaWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.inomotech.canrosetta.companion

# Explicit shared scheme so CI (`xcodebuild -scheme CanRosettaCompanion`) finds
# it without relying on Xcode auto-generating one on open. CanRosettaWidgets is
# built implicitly as an embedded dependency of the app target — deliberately
# not a scheme target, so CI keeps building exactly one scheme.
schemes:
  CanRosettaCompanion:
    build:
      targets:
        CanRosettaCompanion: all
    run:
      config: Debug
    archive:
      config: Release
