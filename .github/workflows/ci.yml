name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: server (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Tests (unit + end-to-end on synthetic data)
        run: pytest -q
      - name: Smoke-test the CLI on the committed sample session
        run: |
          canrosetta identify ../datasets/sample-session --out /tmp/out
          test -f /tmp/out/annotations.json
          test -f /tmp/out/signals.dbc

  edge:
    name: edge / autopi (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: edge/autopi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Tests (simulated transport, no hardware)
        run: pytest -q

  schemas:
    name: schema + sample-session validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - name: Validate schemas parse and the sample session conforms
        run: python .github/scripts/validate_session.py datasets/sample-session

  ios:
    name: companion / ios (build)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate the Xcode project
        working-directory: companion/ios
        run: xcodegen generate
      - name: Build for the iOS Simulator (no code signing)
        working-directory: companion/ios
        run: |
          xcodebuild \
            -project CanRosettaCompanion.xcodeproj \
            -scheme CanRosettaCompanion \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build
