name: Build Server Image

on:
  workflow_dispatch:
    inputs:
      arm64:
        description: "Also build for ARM64 (via QEMU; slow)"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    tags:
      - "v*"
    # Only rebuild when something that affects the image changes.
    paths:
      - "server/**"
      - ".github/workflows/build-image.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/can-rosetta-server

jobs:
  build:
    name: Build and push server image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute platforms
        id: platforms
        env:
          INPUT_ARM64: ${{ github.event.inputs.arm64 }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          # Multi-arch for release tags or when explicitly requested; amd64-only
          # for rolling main builds to keep them fast.
          if [ "$INPUT_ARM64" = "true" ] || [ "$REF_TYPE" = "tag" ]; then
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=can-rosetta-server
          cache-to: type=gha,mode=max,scope=can-rosetta-server
